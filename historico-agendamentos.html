<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
    <link rel="manifest" href="assets/site.webmanifest" />
    <link href="https://fonts.googleapis.com/css?family=Roboto&display=swap" rel="stylesheet" />
    <title>Histórico de Agendamentos — Ericeira Designer</title>
    <link href="tailwind_theme/tailwind.css" rel="stylesheet" type="text/css" />
    <script defer src="js/Alpine.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: "Roboto", sans-serif; }
        .nav-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .nav-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.10); }
    </style>
</head>
<body class="bg-gray-50" x-data="historicoApp">
    <header class="fixed inset-x-0 z-50 bg-white border-b border-gray-200 h-14 flex items-center px-4 gap-3">
        <a href="dashboard.html"
            class="p-2 -ml-1 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-900 transition-colors flex items-center gap-1.5"
            aria-label="Voltar ao painel">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            <span class="text-sm font-medium hidden sm:inline">Painel</span>
        </a>
        <div class="flex items-center gap-2 min-w-0 flex-1">
            <span class="font-semibold text-gray-900 text-sm">Histórico de Agendamentos</span>
        </div>
        <div class="flex items-center gap-1.5 ml-auto">
            <div class="relative" x-data="{ avatarOpen: false }">
                <button @click="avatarOpen = !avatarOpen"
                    class="h-8 w-8 rounded-full bg-pink-100 text-pink-700 font-bold text-sm flex items-center justify-center hover:bg-pink-200 transition-colors focus:outline-none focus:ring-2 focus:ring-pink-300">E</button>
                <div x-show="avatarOpen" x-cloak @click.outside="avatarOpen = false" x-transition
                    class="absolute right-0 top-10 bg-white rounded-xl shadow-xl border border-gray-200 py-1 w-48 z-50">
                    <div class="px-4 py-2.5 border-b border-gray-100">
                        <p class="text-xs font-semibold text-gray-900">Ericeira Designer</p>
                        <p class="text-xs text-gray-400 mt-0.5">Profissional</p>
                    </div>
                    <button @click="logout()" class="w-full text-left px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        Sair
                    </button>
                </div>
            </div>
        </div>
    </header>
    <main class="min-h-screen pt-14">
        <div class="p-4 lg:p-6 max-w-3xl mx-auto">
            <div class="mb-5 flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-gray-900">Histórico</h2>
                    <p class="text-sm text-gray-400 mt-0.5">Agendamentos concluídos</p>
                </div>
                <a href="agendamentos.html"
                    class="text-sm font-medium text-pink-600 hover:text-pink-700 flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    Agendamentos ativos
                </a>
            </div>

            <div x-show="loading" class="bg-white border border-dashed border-gray-200 rounded-xl p-10 text-center">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-pink-500 mx-auto"></div>
                <p class="text-sm font-medium text-gray-500 mt-4">Carregando histórico...</p>
            </div>
            <div x-show="!loading && concludedScheduling.length === 0" class="bg-white border border-dashed border-gray-200 rounded-xl p-10 text-center">
                <p class="text-3xl mb-2">📋</p>
                <p class="text-sm font-medium text-gray-500">Nenhum agendamento concluído</p>
            </div>

            <div class="space-y-3">
                <template x-for="(item, index) in concludedScheduling" :key="item.id || index">
                    <div class="nav-card bg-white border border-gray-200 p-4 rounded-xl shadow-sm">
                        <div class="flex items-start justify-between mb-2">
                            <div>
                                <span class="font-bold text-gray-900" x-text="item.name"></span>
                                <span x-show="item.whatsapp" class="text-xs text-gray-400 ml-2" x-text="item.whatsapp"></span>
                            </div>
                            <span class="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full shrink-0">Concluído</span>
                        </div>
                        <div class="flex items-center gap-3 text-xs text-gray-500">
                            <span class="flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                <span x-text="item.date"></span>
                            </span>
                            <span class="flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                <span x-text="item.time"></span>
                            </span>
                            <span class="flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                <span x-text="item.service"></span>
                            </span>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </main>
    <script src="js/utils.js"></script>
    <script src="js/historico-agendamentos.js"></script>
</body>
</html>
